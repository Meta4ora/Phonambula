<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonambula — Контакты</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <img src="icons/icon_page.png" alt="Phonambula" class="page-icon" onclick="window.location.href='index.html'">

    <div class="contacts-container">
        <div class="contacts-sidebar">
            <div class="sidebar-header">
                <h3>Контакты</h3>
                
            </div>
            <button onclick="openAddEmployeeModal()" id="addEmployeeBtn" class="add-employee-btn">
                    Добавить сотрудника
                </button>
            <ul class="contact-tree">
                <!-- Динамическое содержимое -->
            </ul>
        </div>

        <div class="contact-details" id="contactDetails"></div>
    </div>

    <button id="exportPdfBtn" class="export-pdf-btn" onclick="exportToPDF()">
        📄 Экспорт в PDF
    </button>

    <!-- Модальное окно для добавления сотрудника -->
    <div id="addEmployeeModal" class="modal" style="display: none;">
        <div class="modal-content add-employee-modal">
            <h3>Добавление сотрудника</h3>
            
            <div class="modal-form">
                <div class="form-group">
                    <label>Фамилия *</label>
                    <input type="text" id="empSurname" placeholder="Иванов" required>
                </div>

                <div class="form-group">
                    <label>Имя *</label>
                    <input type="text" id="empName" placeholder="Иван" required>
                </div>

                <div class="form-group">
                    <label>Отчество</label>
                    <input type="text" id="empPatronymic" placeholder="Иванович">
                </div>

                <div class="form-group">
                    <label>Логин (телефон) *</label>
                    <input type="text" id="empLogin" placeholder="+7 (999) 123-45-67" required>
                </div>

                <div class="form-group">
                    <label>Пароль *</label>
                    <input type="password" id="empPassword" placeholder="Введите пароль" required>
                </div>

                <div class="form-group">
                    <label>Подтверждение пароля *</label>
                    <input type="password" id="empConfirmPassword" placeholder="Подтвердите пароль" required>
                </div>

                <div class="form-group">
                    <label>Роль</label>
                    <select id="empRole"></select>
                </div>

                <div class="form-group">
                    <label>Должность</label>
                    <select id="empPosition"></select>
                </div>

                <div class="form-group">
                    <label>Отдел</label>
                    <select id="empDivision"></select>
                </div>

                <div class="form-group">
                    <label>Корпус</label>
                    <select id="empBuilding"></select>
                </div>

                <div class="form-group">
                    <label>Мобильный телефон</label>
                    <input type="text" id="empMobilePhone" placeholder="+7 (999) 123-45-67">
                </div>

                <div class="form-group">
                    <label>Городской телефон</label>
                    <input type="text" id="empLandlinePhone" placeholder="(495) 123-45-67">
                </div>

                <div class="form-group">
                    <label>Внутренний телефон</label>
                    <input type="text" id="empInternalPhone" placeholder="1234">
                </div>

                <div class="form-group">
                    <label>Кабинет</label>
                    <input type="text" id="empCabinet" placeholder="101">
                </div>
            </div>

            <div class="modal-buttons">
                <button class="modal-save" onclick="saveNewEmployee()">Сохранить</button>
                <button class="modal-cancel" onclick="closeAddEmployeeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Скрытый div для генерации PDF -->
<div id="pdfContent" style="position: absolute; left: -9999px; top: -9999px; width: 1200px; padding: 20px; background: white; font-family: Arial, sans-serif;"></div>

    <script src="js/api.js"></script>
    <script src="js/home.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
