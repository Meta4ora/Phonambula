name: CI - Build, Docker & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1 Получаем код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2 Настраиваем JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3 Сборка Maven проекта
      - name: Build Maven project
        working-directory: ./server
        run: mvn -B clean verify

      # 4 Сборка Docker образа
      - name: Build Docker image
        working-directory: ./server
        run: |
          chmod +x mvnw
          docker build -t phonambula-backend:latest .

      # 5 Запуск бэкенд контейнера
      - name: Run backend container
        id: run_backend
        run: |
          HOST_PORT=$(shuf -i 50000-60000 -n 1)
          echo "HOST_PORT=$HOST_PORT" >> $GITHUB_ENV
          docker run -d --name phonambula-backend -p $HOST_PORT:8080 phonambula-backend:latest
          echo "Backend running on port $HOST_PORT"
          sleep 30

      # 6 Установка jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 7 Ждём, чтобы сервис поднялся
      - name: Wait for backend
        run: |
          echo "Waiting for backend to start..."
          for i in {1..20}; do
            if curl -s http://localhost:$HOST_PORT/actuator/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Waiting for backend... attempt $i"
            sleep 3
            if [ $i -eq 20 ]; then
              echo "Backend failed to start"
              docker logs phonambula-backend --tail 50
              exit 1
            fi
          done
      
      # 8 Получаем токен админа
      - name: Get JWT token
        run: |
          echo "Requesting JWT token..."
          
          LOGIN_RESPONSE=$(curl -s -X POST http://localhost:$HOST_PORT/auth/login \
            -H "Content-Type: application/json" \
            -d '{"login":"admin","password":"admin"}')
          
          echo "Login response: $LOGIN_RESPONSE"
          
          TOKEN=$(echo $LOGIN_RESPONSE | jq -r '.token')
          
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to get JWT token"
            exit 1
          fi
          
          echo "JWT_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "Token received"

      # ==================== ТЕСТЫ API ====================
      
      # 9 Тестируем GET /api/users
      - name: Test GET /api/users
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:$HOST_PORT/api/users)
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Users API failed with HTTP code $HTTP_CODE"
            exit 1
          fi
          echo "GET /api/users - OK"

      # 10 Тестируем GET /api/roles
      - name: Test GET /api/roles
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:$HOST_PORT/api/roles)
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Roles API failed with HTTP code $HTTP_CODE"
            exit 1
          fi
          echo "GET /api/roles - OK"

      # 11 Тестируем GET /api/buildings
      - name: Test GET /api/buildings
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:$HOST_PORT/api/buildings)
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Buildings API failed with HTTP code $HTTP_CODE"
            exit 1
          fi
          echo "GET /api/buildings - OK"

      # 12 Тестируем GET /api/divisions
      - name: Test GET /api/divisions
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:$HOST_PORT/api/divisions)
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Divisions API failed with HTTP code $HTTP_CODE"
            exit 1
          fi
          echo "GET /api/divisions - OK"

      # 13 Тестируем GET /api/posts
      - name: Test GET /api/posts
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:$HOST_PORT/api/posts)
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Posts API failed with HTTP code $HTTP_CODE"
            exit 1
          fi
          echo "GET /api/posts - OK"

      # 14 Тестируем GET /api/subscribers/my
      - name: Test GET /api/subscribers/my
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:$HOST_PORT/api/subscribers/my)
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Subscribers/my API failed with HTTP code $HTTP_CODE"
            exit 1
          fi
          echo "GET /api/subscribers/my - OK"

      # 15 Тестируем GET /api/users/me
      - name: Test GET /api/users/me
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:$HOST_PORT/api/users/me)
          
          echo "Current user response: $RESPONSE"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:$HOST_PORT/api/users/me)
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Users/me API failed with HTTP code $HTTP_CODE"
            exit 1
          fi
          
          ROLE=$(echo $RESPONSE | jq -r '.role')
          if [ "$ROLE" != "Администратор" ]; then
            echo "Wrong role: $ROLE, expected Администратор"
            exit 1
          fi
          echo "GET /api/users/me - OK, role: $ROLE"

      # 16 Тестируем создание нового пользователя (БЕЗ создания абонента)
      - name: Test POST /auth/register (create user without subscriber)
        run: |
          echo "=== Creating test user (without subscriber) ==="
          RANDOM_LOGIN="testuser_$(date +%s)_$RANDOM"
          
          # Регистрируем ТОЛЬКО пользователя, без абонента
          REGISTER_DATA="{
            \"surname\": \"Testov\",
            \"name\": \"Test\",
            \"patronymic\": \"Testovich\",
            \"login\": \"$RANDOM_LOGIN\",
            \"password\": \"test123\",
            \"roleId\": 2
          }"
          
          echo "Sending registration request..."
          
          REGISTER_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:$HOST_PORT/auth/register \
            -H "Content-Type: application/json" \
            -d "$REGISTER_DATA")
          
          HTTP_CODE=$(echo "$REGISTER_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$REGISTER_RESPONSE" | sed '$d')
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response body: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Registration failed with HTTP $HTTP_CODE"
            echo "Response: $RESPONSE_BODY"
            exit 1
          fi
          
          USER_TOKEN=$(echo $RESPONSE_BODY | jq -r '.token')
          if [ "$USER_TOKEN" = "null" ] || [ -z "$USER_TOKEN" ]; then
            echo "Failed to get token from response"
            exit 1
          fi
          
          # Получаем ID созданного пользователя
          USER_INFO=$(curl -s -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:$HOST_PORT/api/users/by-login/$RANDOM_LOGIN)
          USER_ID=$(echo $USER_INFO | jq -r '.id')
          
          echo "User created successfully with login: $RANDOM_LOGIN, ID: $USER_ID"
          echo "TEST_USER_LOGIN=$RANDOM_LOGIN" >> $GITHUB_ENV
          echo "TEST_USER_ID=$USER_ID" >> $GITHUB_ENV
          echo "TEST_USER_TOKEN=$USER_TOKEN" >> $GITHUB_ENV

      # 17 Тестируем вход созданного пользователя
      - name: Test POST /auth/login (new user)
        run: |
          if [ -n "$TEST_USER_LOGIN" ]; then
            echo "=== Testing login for new user ==="
            LOGIN_RESPONSE=$(curl -s -X POST http://localhost:$HOST_PORT/auth/login \
              -H "Content-Type: application/json" \
              -d "{\"login\":\"$TEST_USER_LOGIN\",\"password\":\"test123\"}")
            
            echo "Login response: $LOGIN_RESPONSE"
            
            TOKEN=$(echo $LOGIN_RESPONSE | jq -r '.token')
            if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
              echo "Failed to login with new user"
              exit 1
            fi
            echo "New user login successful"
          else
            echo "No test user created, skipping login test"
          fi

      # 18 Тестируем попытку входа с неверным паролем
      - name: Test POST /auth/login (wrong password - should fail)
        run: |
          echo "=== Testing wrong password ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            http://localhost:$HOST_PORT/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"login\":\"admin\",\"password\":\"wrongpassword\"}")
          
          echo "HTTP Status Code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ne 401 ] && [ "$HTTP_CODE" -ne 403 ]; then
            echo "Wrong password should return 401/403, got $HTTP_CODE"
            exit 1
          fi
          echo "Wrong password correctly rejected with $HTTP_CODE"

      # 19 Тестируем авторизацию без токена (должна быть ошибка)
      - name: Test unauthorized access
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:$HOST_PORT/api/subscribers/my)
          
          if [ "$HTTP_CODE" -ne 401 ] && [ "$HTTP_CODE" -ne 403 ]; then
            echo "Unauthorized access should return 401/403, got $HTTP_CODE"
            exit 1
          fi
          echo "Unauthorized access correctly blocked"

      # 20 Тестируем регистрацию с дублирующимся логином (должна быть ошибка)
      - name: Test POST /auth/register (duplicate login - should fail)
        run: |
          if [ -n "$TEST_USER_LOGIN" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              http://localhost:$HOST_PORT/auth/register \
              -H "Content-Type: application/json" \
              -d "{
                \"surname\": \"Testov2\",
                \"name\": \"Test2\",
                \"login\": \"$TEST_USER_LOGIN\",
                \"password\": \"test123\",
                \"roleId\": 2
              }")
            
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "Duplicate registration should fail, but got $HTTP_CODE"
              exit 1
            fi
            echo "Duplicate registration correctly failed with $HTTP_CODE"
          fi

      # 21 Удаление тестового пользователя и всех связанных данных
      - name: Cleanup - Delete test user and all related data
        if: always()
        run: |
          if [ -n "$TEST_USER_ID" ]; then
            echo "=== Cleaning up test user ID: $TEST_USER_ID ==="
            
            # Получаем имя контейнера PostgreSQL
            DB_CONTAINER=$(docker ps -q -f name=phonambula-db)
            
            if [ -z "$DB_CONTAINER" ]; then
              DB_CONTAINER=$(docker ps -q -f name=db)
            fi
            
            if [ -n "$DB_CONTAINER" ]; then
              echo "Found DB container: $DB_CONTAINER"
              
              # 1. Удаляем записи из audit_log (если есть)
              echo "Deleting audit_log entries for user $TEST_USER_ID..."
              docker exec $DB_CONTAINER psql -U postgres -d phonambula -c \
                "DELETE FROM audit_log WHERE id_user = $TEST_USER_ID;" 2>/dev/null || true
              
              # 2. Удаляем абонента (subscriber)
              echo "Deleting subscriber for user $TEST_USER_ID..."
              docker exec $DB_CONTAINER psql -U postgres -d phonambula -c \
                "DELETE FROM subscribers WHERE id_user = $TEST_USER_ID;" 2>/dev/null || true
              
              # 3. Удаляем пользователя
              echo "Deleting user $TEST_USER_ID..."
              docker exec $DB_CONTAINER psql -U postgres -d phonambula -c \
                "DELETE FROM users WHERE id_user = $TEST_USER_ID;" 2>/dev/null || true
              
              echo "✅ Cleanup completed"
              
              # Проверяем, что пользователь удален
              CHECK_USER=$(docker exec $DB_CONTAINER psql -U postgres -d phonambula -t -c \
                "SELECT COUNT(*) FROM users WHERE id_user = $TEST_USER_ID;" 2>/dev/null | tr -d ' ')
              
              if [ "$CHECK_USER" -eq 0 ]; then
                echo "✅ Verification: User $TEST_USER_ID is gone"
              else
                echo "⚠️ Warning: User $TEST_USER_ID still exists"
              fi
            else
              echo "⚠️ Could not find database container"
            fi
          else
            echo "No test user to delete"
          fi

      # 22 Финальная проверка
      - name: Final health check
        run: |
          echo "=== FINAL TEST SUMMARY ==="
          echo "All API tests completed successfully!"
          
          if docker ps | grep -q phonambula-backend; then
            echo "Backend container is still running"
          else
            echo "Warning: Backend container stopped"
          fi

      # 23 Останавливаем контейнер после тестов
      - name: Stop backend container
        if: always()
        run: |
          docker stop phonambula-backend || true
          docker rm phonambula-backend || true